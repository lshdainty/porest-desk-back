spring:
  config:
    import: optional:file:.env.${SPRING_PROFILES_ACTIVE:local}[.properties]
  application:
    name: porest-desk

  # DB 설정
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:10}
      minimum-idle: ${HIKARI_MIN_IDLE:5}
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${HIKARI_IDLE_TIMEOUT:600000}
      max-lifetime: ${HIKARI_MAX_LIFETIME:1800000}
      leak-detection-threshold: ${HIKARI_LEAK_DETECTION:60000}
    p6spy:
      enable-logging: ${P6SPY_ENABLED:true}
      multiline: true
      logging: slf4j
      tracing:
        include-parameter-values: true

  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        default_batch_fetch_size: 100
        format_sql: true
    open-in-view: false

  # Redis 설정
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      database: ${REDIS_DATABASE:3}

  # Graceful Shutdown
  lifecycle:
    timeout-per-shutdown-phase: ${SHUTDOWN_TIMEOUT:30s}

  # 에러 정보 표시
  web:
    error:
      include-stacktrace: ${ERROR_STACKTRACE:never}
      include-message: ${ERROR_MESSAGE:never}
      include-exception: ${ERROR_EXCEPTION:false}
      include-binding-errors: ${ERROR_BINDING:never}

# 서버 설정
server:
  port: ${SERVER_PORT:8002}
  shutdown: ${SERVER_SHUTDOWN:graceful}
  forward-headers-strategy: framework

# 로깅 설정
logging:
  level:
    com.porest.desk: ${LOG_LEVEL:info}
    org.hibernate.SQL: ${LOG_LEVEL_HIBERNATE:info}
    org.hibernate.type.descriptor.sql.BasicBinder: ${LOG_LEVEL_HIBERNATE_BINDER:info}
    p6spy: info
    root: ${LOG_LEVEL_ROOT:info}

# JWT 설정
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_EXPIRATION:3600000}
  sso-secret: ${JWT_SSO_SECRET}

# 어플리케이션 정보
app:
  sso:
    base-url: ${SSO_API_URL}
  cors:
    allowed-origins: ${CORS_ORIGINS}

# Swagger 설정
springdoc:
  api-docs:
    path: /api-docs
    enabled: ${SWAGGER_ENABLED:true}
  swagger-ui:
    path: /swagger-ui/index.html
    enabled: ${SWAGGER_ENABLED:true}
    tags-sorter: alpha
    operations-sorter: alpha

# Prometheus 설정
management:
  endpoints:
    web:
      exposure:
        include: prometheus, health, info, metrics
  metrics:
    tags:
      application: porest-desk
